name: QSFilterPlugin
version: "${version}"
main: cn.hdbstudio.qsfilter.QSFilterPlugin
api-version: "1.21"
author: TRIPLE Y, HDB-Studio
description: QS 商店过滤插件 — 价格加权平均过滤 + RESTful API 暴露

softdepend:
  - QuickShop-Hikari

commands:
  qsfilter:
    description: QSFilterPlugin 命令
    usage: /qsfilter <lf|condition|about|reload|stats|clearcache>

permissions:
  qsfilter.use:
    description: 允许使用 /qsfilter lf 查询物品价格
    default: true
  qsfilter.admin:
    description: 管理 QSFilterPlugin（condition/about/reload/stats/clearcache/dumpqs）
    default: op
    children:
      qsfilter.use: true
